<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DWYREX Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-8">

<div class="max-w-6xl mx-auto">
  <h1 class="text-4xl font-bold mb-10 text-center">DWYREX Admin Panel</h1>

  <div class="grid md:grid-cols-2 gap-8">
    <!-- Hafıza Listesi -->
    <div class="bg-zinc-900 p-8 rounded-3xl">
      <h2 class="text-2xl font-semibold mb-6">Hafıza Kayıtları</h2>
      <div id="memoryList" class="space-y-4"></div>
    </div>

    <!-- Arama ve Yönetim -->
    <div class="bg-zinc-900 p-8 rounded-3xl">
      <h2 class="text-2xl font-semibold mb-6">Yönetim</h2>
      <input id="searchAdmin" placeholder="Arama yap..." class="w-full p-4 bg-zinc-800 border border-zinc-700 rounded-2xl mb-6">
      <button onclick="loadMemories()" class="w-full py-4 bg-white text-black font-bold rounded-2xl mb-4">
        Tüm Hafızaları Yükle
      </button>
      <button onclick="clearAll()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-2xl">
        Tümünü Temizle
      </button>
    </div>
  </div>
</div>

<script>
  const EDGE_URL = "https://BURAYA_EDGE_FUNCTION_LINKİNİ_YAZ"; // ← Burayı kendi linkinle değiştir

  async function loadMemories() {
    // Bu kısım ileride search fonksiyonu ile doldurulacak
    document.getElementById('memoryList').innerHTML = '<p class="text-gray-400">Henüz hafıza kaydı yok veya arama özelliği geliştiriliyor...</p>';
  }

  function clearAll() {
    if (confirm("Tüm hafızaları silmek istediğinizden emin misiniz?")) {
      alert("Tüm kayıtlar silindi (demo).");
    }
  }
</script>
</body>
</html>
